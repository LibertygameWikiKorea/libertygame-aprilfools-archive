<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>리버티게임 2.0 AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #212121;
            --text-primary: #ececec;
            --text-secondary: #aaaaaa;
            --accent-color: #00A500;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        .app-container {
            display: flex;
            width: 100%;
            height: 100%;
        }

        .chat-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            background-color: var(--bg-color);
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            100% { background-position: 150% 50%; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .accent-text {
            background: linear-gradient(135deg, #ccff00, #00ff88, #00d2ff, #a78bfa, #00ff88, #ccff00);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            color: transparent;
            animation: gradientShift 5s linear infinite;
        }

        .badge-ai {
            font-size: 0.7em;
            font-weight: 700;
            background-color: rgba(0, 165, 0, 0.15);
            color: var(--accent-color);
            padding: 2px 8px;
            border-radius: 6px;
            margin-left: 4px;
            position: relative;
            top: -2px;
        }

        .chat-hero {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            animation: fadeIn 0.4s ease-in-out;
        }

        .chat-hero h1 {
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }

        .chat-hero p {
            font-size: 16px;
            color: var(--text-secondary);
        }

        .badge-ai-hover {
            text-decoration: none;
            display: inline-grid;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div class="app-container">
        <main class="chat-wrapper">
            <div class="chat-hero" id="chat-hero" style="font-weight: bold; font-size: 1.75em;">
                <img src="https://libertygame.work/wiki/특수:넘겨주기/file/Libertygame_logo_reverse_character.svg"
                    alt="Liberty AI Logo" style="width: 10em; height: 10em; margin-bottom: 1.5em;">
                <p style="letter-spacing: 0.5rem; color: var(--accent-color); font-size: 1em;">세상에 없는 게임을 만나다</p>
                <h1 style="font-size: 3em">리버티게임 <span class="accent-text">2.0</span> <span
                        class="badge-ai badge-ai-hover"
                        style="padding: 0.05em 0.5em; border-radius: 0.25em; vertical-align: middle;"><span
                            class="accent-text">AI</span></span></h1>
                <p style="margin-top: 1em; letter-spacing: 0.25rem; font-size: 1em;">2026년 4월 1일 출시</p>
            </div>

        </main>
    </div>

</body>

</html>
